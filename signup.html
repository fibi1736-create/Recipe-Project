<!DOCTYPE html>
<html lang="en">
<head>
   <title>Signup</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif;">
    <header></header>
    <main>
        <h1 style="text-align: center;">Signup</h1>

        <form action="#" method="post" style="max-width: 700px; margin: 30px auto; padding: 0 18px; color: #333; font-size: 20px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.01);">
        <label for="email" style="display: block; margin-bottom: 6px; color: #333; font-weight: 600; "></label>
        <input type="email" id="email" name="email" placeholder="Enter your Email" style="width: 95%; padding: 15px; border-radius: 7px; margin-bottom: 12px; font-size: medium;">

        <label for="password" style="display: block; margin-bottom: 6px; color: #333; font-weight: 600; "></label>
        <input type="password" id="password" name="password" placeholder="Create a password" style="width: 95%; padding: 15px; border-radius: 7px; margin-bottom: 12px; font-size: medium;">

        <label for="Confirm_password" style="display: block; margin-bottom: 6px; color: #333; font-weight: 600; "></label>
        <input type="password" id="Confirm_password" name="Confirm_password" placeholder="Confirm your password" style="width: 95%; padding: 15px; border-radius: 7px; margin-bottom: 12px; font-size: medium;">

        <button type="submit" style="background-color: #2c3e50; color: white; width: 100%; padding: 14px 20px; border-radius: 7px; border: none; font-size: 16px; margin-bottom: 15px; font-weight: bold;">Signup</button>

        </form>
    </main>
    <footer style="text-align: center; padding: 20px ; background-color: #f1f1f1; ">
       <p style="font-size: 20px;">@ 2025</p>
    </footer>
</body>
</html>
