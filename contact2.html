<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; background-color: #f4f6f8;">
    <header>
         <div style="text-align: center; background-color:#2c3e50; padding:20px; ">
            <a href="index2.html" style="color:white; margin:0 16px; text-decoration:none; font-size:18px; font-weight: 600;">Home</a>
            <a href="recipe2.html" style="color:white; margin:0 16px; text-decoration:none; font-size:18px; font-weight: 600;">Recipes</a>
            <a href="about2.html" style="color:white; margin:0 16px;text-decoration:none; font-size:18px; font-weight: 600;">About</a>
            <a href="contact2.html" style="color:white; margin:0 16px;text-decoration:none; font-size:18px; font-weight: 600;">Contact</a>
        </div>
    </header>
    <main style="max-width: 700px; margin: 30px auto; padding: 0 18px; color: #333;">
        <h2 style="color: #27ae60; margin-top: 0; ">Contact Us</h2>
        <p style="color: #555;">Have a question or a recipe idea? Fill out the form below and we'll get back to you.</p>
        <form action="#" method="post" style="padding: 18px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">

            <label for="name" style="display: block; margin-bottom: 6px; color: #333; font-weight: 600;">Name</label>
            <input type="text" id="name" placeholder="Full Name" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px;">

            <label for="email" style="display: block; margin-bottom: 6px; color: #333; font-weight: 600;">Email</label>
            <input type="email" id="email" placeholder="Email Address" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px;">

            <label for="message" style="display: block; margin-bottom: 6px; color: #333; font-weight: 600;">Message</label>
            <textarea type="message" id="message" placeholder="Write a Message" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px;" rows="6"></textarea>

            <div style="display: flex; gap: 10px;">
                <!--send message-->
                <button type="submit" style="background-color: #27ae60; color: #fff; border: none; padding: 10px 16px; border-radius: 16px; cursor: pointer; font-weight:700;">Send Message</button> 
                <!--Reset-->
                <button type="reset" style="background-color: #ecf0f1; color: #555; border: none; padding: 10px 16px; border-radius: 16px; cursor: pointer;">Reset</button>
            </div>
        </form>
    </main>
    <footer></footer>
</body>
</html>
