<!DOCTYPE html>
<html lang="en">
<head>
    <title>login page</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
</head>

<body style="font-family: Arial, Helvetica, sans-serif;">
    <header></header>
    <main>
        <h1 style="text-align: center;">Login</h1>
        <h3 style="color: #555; text-align: center;">Welcome! Please login to continue.</h3>

        <form action="#" method="post" style="max-width: 700px; margin: 30px auto; padding: 0 18px; color: #333; font-size: 20px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.01);">
            <label for="email" style="display: block; margin-bottom: 6px; color: #333; font-weight: 600; ">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required style="width: 95%; padding: 12px; border-radius: 7px; margin-bottom: 12px; font-size: medium;">

            <label for="password" style="display: block; margin-bottom: 8px; color: #333; font-weight: 600;">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" required style="width: 95%; padding: 12px; border-radius: 7px; margin-bottom: 12px; font-size: medium;">

            <a style="display: block; margin-bottom: 20px; font-size: 16px;">Forgot password?</a>
            
            <button type="submit" style="background-color: #2c3e50; color: white; width: 100%; padding: 14px 20px; border-radius: 7px; border: none; font-size: 16px; margin-bottom: 15px; font-weight: bold;">Login</button>
        </form>

            <p style="text-align: center; padding: 30px; padding-bottom: 10px; font-size: 20px;">
                Or Sign in with
            </p>

            <div style="text-align: center; margin: 25px;">
            <a href="https://www.facebook.com" style="text-decoration: none;">
                <i class="fa-brands fa-facebook" style="font-size: 30px; margin: 0 10px; cursor: pointer; color: blue;"></i>
            </a>
            <a href="https://www.yahoo.com/" style="text-decoration: none;">
                <i class="fa-brands fa-yahoo" style="font-size: 30px; margin: 0 10px; cursor: pointer; color: purple;"></i>
            </a>
            <a href="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://www.instagram.com/&ved=2ahUKEwjLss7RyOeRAxWQVPEDHR0cL20QFnoECA0QAQ&usg=AOvVaw1cBeRoOpMhZ3-x5M1sA3Fm">
                <i class="fa-brands fa-instagram" style="font-size: 30px; margin: 0 10px; cursor: pointer; color:#E1306C; ;"></i>
            </a>
            </div>
            <p style="text-align: center;">
                Don't have an account?
                <a href="signup.html" style="text-decoration: none;">Signup</a>
            </p>
           
    </main>
    <footer style="text-align: center; padding: 20px ; background-color: #f1f1f1; ">
       <p style="font-size: 20px;">@ 2025</p>
    </footer>
    
</body>
</html>
