<!DOCTYPE html>

<body style="font-family: Arial, Helvetica, sans-serif; background-color: #f4f6f8;">

            <a href="contact.html" style="color:white; margin:0 16px;text-decoration:none; font-size:18px; font-weight: 600;">Contact</a>
        </div>
    </header>
    <main>
        <div style="background-image:url('https://accessnsite.com/wp-content/uploads/2020/05/page-heading-background-contact-us.jpg'); height: 200px; background-size: cover; background-position: center; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold;">Contact Us</div>
        <h2 style="text-align: center; margin-top: 70px; font-size: 28px; font-weight: bold; color: #09203f;">Get In Touch With YumDiary</h2>
        <div style="display: flex; gap: 200px; flex-wrap: wrap; justify-content:center; padding: 50px 40px; max-width: 1500px; text-align: center;">
            <div style="background-color:#09203f; color: white; border-radius: 5px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.6); justify-content: center;"> 
            <h2>Our Location</h2>
            <p>Peshawar</p>
            </div>
            <div style="color:#09203f; background-color: white; border-radius: 5px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.6); justify-content: center;">
            <h2>Phone Number</h2>
            <p>0332 9590643</p>
            </div>
            <div style="background-color:#09203f; color: white; border-radius: 5px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.6); justify-content: center;">
            <h2>Email Us</h2>
            <p>YumDiary@gmail.com</p>
            </div>
        </div>
        <div style="background-color: white; padding: 50px 100px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; font-size: medium;">
            <h3>Send a Message</h3>
            <form action="#" method="post">
            <input type="text" placeholder="Name" required style="width: 100%; padding: 12px; margin-bottom: 20px;font-weight:bold; font-size: medium; border-radius: 5px;">
            
            <input type="email" placeholder="E-Mail Address" required style="width: 100%; padding: 12px; margin-bottom: 20px; font-weight:bold; font-size: medium; border-radius: 5px;">
           
            <textarea placeholder="Message" rows="4" style="width: 100%; padding: 12px; margin-bottom: 20px;  font-weight:bold; font-size: medium; border-radius: 5px;"></textarea>
           
            <button type="submit" style="background: linear-gradient(to right,#0059b3,#003366); color: white; border-radius: 15px; font-weight: bold; padding: 13px 60px; border: none; font-size: 15px;">Submit</button>
            </form>
        </div>
    </main>
   <footer style="text-align: center; padding: 20px ; background-color: #09203f; color: white; ">
