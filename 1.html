<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Yum Dairy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --amber-50: #fffbeb;
      --orange-50: #fff7ed;
      --yellow-50: #fefce8;
      --amber-300: #fcd34d;
      --amber-500: #f59e0b;
      --amber-600: #d97706;
      --amber-800: #92400e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
    }

    /* Splash container */
    .splash {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        135deg,
        var(--amber-50),
        var(--orange-50),
        var(--yellow-50)
      );
      transition: opacity 0.5s ease;
    }

    .splash.exit {
      opacity: 0;
      pointer-events: none;
    }

    /* Floating dishes */
    .floating {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .dish {
      position: absolute;
      bottom: -100px;
      animation-name: float-up;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes float-up {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
      animation: fade-in 0.8s ease;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo glow */
    .logo-wrapper {
      position: relative;
    }

    .logo-glow {
      position: absolute;
      inset: 0;
      background: rgba(252, 211, 77, 0.3);
      filter: blur(60px);
      border-radius: 50%;
      transform: scale(1.5);
    }

    svg {
      width: 160px;
      height: 160px;
      color: var(--amber-600);
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
    }

    h1 {
      font-size: clamp(3rem, 6vw, 4.5rem);
      font-weight: 800;
      color: var(--amber-800);
      letter-spacing: -0.02em;
    }

    p {
      margin-top: 0.5rem;
      font-size: 1.2rem;
      color: rgba(217, 119, 6, 0.8);
      font-weight: 500;
    }

    /* Button */
    .enter-btn {
      margin-top: 1rem;
      padding: 1.2rem 2.8rem;
      font-size: 1.25rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(90deg, #f59e0b, #f97316);
      box-shadow: 0 12px 30px rgba(245, 158, 11, 0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .enter-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 18px 40px rgba(245, 158, 11, 0.5);
    }
  </style>
</head>

<body>

  <div class="splash" id="splash">
    <!-- Floating dishes -->
    <div class="floating">
      <div class="dish" style="left:10%; font-size:48px; animation-duration:8s;">🍕</div>
      <div class="dish" style="left:25%; font-size:40px; animation-duration:10s; animation-delay:1s;">🍔</div>
      <div class="dish" style="left:40%; font-size:44px; animation-duration:9s; animation-delay:.5s;">🍰</div>
      <div class="dish" style="left:55%; font-size:42px; animation-duration:11s; animation-delay:1.5s;">🥗</div>
      <div class="dish" style="left:70%; font-size:46px; animation-duration:8s; animation-delay:.8s;">🍜</div>
      <div class="dish" style="left:85%; font-size:38px; animation-duration:10s; animation-delay:2s;">🧁</div>
      <div class="dish" style="left:15%; font-size:40px; animation-duration:9s; animation-delay:1.2s;">🥧</div>
      <div class="dish" style="left:50%; font-size:50px; animation-duration:12s; animation-delay:.3s;">🍣</div>
      <div class="dish" style="left:80%; font-size:36px; animation-duration:8s; animation-delay:1.8s;">🥐</div>
      <div class="dish" style="left:35%; font-size:44px; animation-duration:11s; animation-delay:.6s;">🍩</div>
      <div class="dish" style="left:5%; font-size:42px; animation-duration:9s; animation-delay:2.2s;">🧀</div>
      <div class="dish" style="left:95%; font-size:40px; animation-duration:10s; animation-delay:.4s;">🥛</div>
    </div>

    <!-- Main content -->
    <div class="content">
      <div class="logo-wrapper">
        <div class="logo-glow"></div>

        <!-- Chef Cap Logo -->
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="35" r="18" fill="currentColor"/>
          <circle cx="50" cy="25" r="20" fill="currentColor"/>
          <circle cx="70" cy="35" r="18" fill="currentColor"/>
          <rect x="25" y="40" width="50" height="35" rx="3" fill="currentColor"/>
          <rect x="25" y="68" width="50" height="8" rx="2" fill="currentColor" opacity="0.8"/>
          <line x1="35" y1="45" x2="35" y2="65" stroke="#fff" stroke-width="2" opacity="0.3"/>
          <line x1="50" y1="45" x2="50" y2="65" stroke="#fff" stroke-width="2" opacity="0.3"/>
          <line x1="65" y1="45" x2="65" y2="65" stroke="#fff" stroke-width="2" opacity="0.3"/>
        </svg>
      </div>

      <div>
        <h1>Yum Dairy</h1>
        <p>Fresh from the farm to your table</p>
      </div>

      <button class="enter-btn" onclick="enterApp()">🍳 Let’s Cooking</button>
    </div>
  </div>

  <script>
    function enterApp() {
      const splash = document.getElementById("splash");
      splash.classList.add("exit");

      setTimeout(() => {
        splash.remove();
        // Your main app can load here
        console.log("Splash dismissed");
      }, 500);
    }
  </script>

</body>
</html>
